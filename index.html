<!-- Inside <section id="budget-calculator"> -->
<input type="number" id="income" placeholder="Enter Monthly Income" oninput="updateDashboard()">

<div class="chart-container" style="position: relative; height:200px; width:200px; margin: auto;">
    <canvas id="budgetChart"></canvas>
</div>

<div id="results">
    <p class="tooltip">Survival (50%): <span id="survival">0</span>
        <span class="tooltiptext">Essential costs: Housing, food, utilities, transport.</span>
    </p>
    <p class="tooltip">Comforts (30%): <span id="comforts">0</span>
        <span class="tooltiptext">Variable lifestyle costs: Dining, hobbies, subscriptions.</span>
    </p>
    <p id="fortification-box" class="tooltip">Fortification (20%): <span id="fortification">0</span>
        <span class="tooltiptext">Wealth building: Debt repayment, savings, investments.</span>
    </p>
</div>
