<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recession-Resilience Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Financial Fortress Dashboard</h1>
        
        <section id="budget-calculator">
            <h2>50/30/20 Budget</h2>
            <input type="number" id="income" placeholder="Enter Monthly Income">
            <button onclick="calculateBudget()">Calculate</button>
            
            <div id="results">
                <p>Survival (50%): <span id="survival">0</span></p>
                <p>Comforts (30%): <span id="comforts">0</span></p>
                <p>Fortification (20%): <span id="fortification">0</span></p>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
